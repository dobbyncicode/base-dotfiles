[uservariables]
user_email = "email"
user_name = "name"

[config]
backup = false
banner = false
create = true
dotpath = "home"
keepdot = false
link_dotfile_default = "nolink"
link_on_import = "nolink"
longkey = false
workdir = "cache"
import_variables = [
    "variables.yaml",
    "uservariables.yaml:optional",
]

[dotfiles.d_hypr]
src = "dotfiles/hypr"
dst = "~/.config/custom-dotfiles/hypr"

[dotfiles.d_pictures]
src = "Wallpapers"
dst = "~/Pictures/Wallpapers"
link = "absolute"

[dotfiles.f_bashrc]
src = "bashrc"
dst = "~/.bashrc"

[dotfiles.f_caelestia-hypr]
src = "dotfiles/caelestia/hypr-user.conf"
dst = "~/.config/caelestia/hypr-user.conf"

[dotfiles.f_caelestia-fish]
src = "dotfiles/caelestia/user-config.fish"
dst = "{{@@ fish_config_dir @@}}"
link = "absolute"

[dotfiles.f_gitconfig]
src = "gitconfig"
dst = "~/.gitconfig"
link = "absolute"

[dotfiles.f_caelestia-shell]
src = "dotfiles/caelestia/shell.json"
dst = "~/.config/caelestia/shell.json"
link = "absolute"

[dotfiles.f_nvim-default]
src = "dotfiles/nvim/patch.lua"
dst = "~/.config/nvim/after/plugin/patch.lua"

[dotfiles.f_yt-dlp]
src = "dotfiles/yt-dlp/config"
dst = "~/.config/yt-dlp/config"

[profiles.DobbynciCode]
dotfiles = [
    "d_hypr",
    "d_pictures",
    "f_bashrc",
    "f_caelestia-hypr",
    "f_caelestia-fish",
    "f_gitconfig",
    "f_caelestia-shell",
    "f_nvim-default",
    "f_yt-dlp"
]

[profiles.DobbynciCode.variables]
fish_config_dir = "~/.config/caelestia/user-config.fish"

[profiles.localhost]
dotfiles = [
    "f_nvim-default",
    "f_gitconfig",
    "f_caelestia-fish"
]

[profiles.localhost.variables]
fish_config_dir = "~/.config/fish/config.fish"


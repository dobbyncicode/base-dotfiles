variables:
    # --- [ i ] - Apps ---
    terminal: "foot"
    browser: "brave"
    volume_control: "pavucontrol"
    file_manager: "{{@@ terminal @@}} -a yazi-float yazi"
    editor: "nvim"

    # --- [ i ] - Editor information ---
    tab_space: "4"

    # --- [ i ] - System information ---
    interactive_shell: fish
    default_shell: bash
    root_repo: "{{@@ _dotdrop_cfgpath.rsplit('/', 1)[0] @@}}"

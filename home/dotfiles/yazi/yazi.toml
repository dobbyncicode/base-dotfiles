[mgr]
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = true
show_symlink = true
mouse_events = [
    "click",
    "scroll",
    "touch",
    "move",
    "drag"
]

[preview]
wrap = "yes"
tab_size = {{@@ tab_space @@}}

[input]
cursor_blink = true
